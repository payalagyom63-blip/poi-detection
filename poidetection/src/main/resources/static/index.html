<!DOCTYPE html>
<html>
<head>
    <title>POI Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: #fff;
        }
        .container {
            max-width: 500px;
            margin: 80px auto;
            background: #ffffff;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        .status-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            text-align: left;
        }
        .label { font-weight: 600; }
        .value { font-size: 14px; }
        button {
            margin-top: 10px;
            padding: 12px 20px;
            border-radius: 10px;
            background: #667eea;
            color: white;
            cursor: pointer;
        }
        .notification {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            background: #e6fffa;
            display: none;
        }
        .error {
            background: #ffe6e6;
            color: #991b1b;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>POI Tracker</h1>

    <div class="status-box">
        <div class="label">Location</div>
        <div id="location" class="value">Not available</div>
    </div>

    <div class="status-box">
        <div class="label">POI Status</div>
        <div id="poi" class="value">No POI detected</div>
    </div>

    <div class="status-box">
        <div class="label">API Response</div>
        <div id="status" class="value">Idle</div>
    </div>

    <button onclick="enableTracking()">Enable Tracking</button>
    <button onclick="startTracking()">Start Tracking</button>

    <div id="notification" class="notification"></div>
</div>

<script>
    let trackingStarted = false;

    // FIX 1: Correct WebSocket URL
    const socket = new SockJS('http://localhost:8080/ws');
    const stomp = Stomp.over(socket);

    // FIX 2: Disable noisy logs
    stomp.debug = null;

    stomp.connect({}, function () {
        console.log("WebSocket Connected");

        stomp.subscribe('/topic/poi', function (message) {
            console.log("📩 Received:", message.body);

            showNotification(message.body);

            // Show actual POI name instead of generic text
            document.getElementById("poi").innerText = message.body;
        });
    });

    // CONSENT API
    function enableTracking() {
        fetch("http://localhost:8080/user/enable-tracking/1", {
            method: "POST"
        })
        .then(res => res.text())
        .then(msg => showNotification(msg))
        .catch(() => showNotification("Failed to enable tracking", true));
    }

    // MAIN TRACKING FUNCTION (FINAL FIXED)
    function startTracking() {

        if (trackingStarted) return;
        trackingStarted = true;

        // ✅ FIX 3: Check browser support
        if (!navigator.geolocation) {
            showNotification("Geolocation not supported", true);
            return;
        }

        // ✅ FIX 4: Ask permission + live tracking
        navigator.geolocation.watchPosition(

            function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                document.getElementById("location").innerText =
                    "Lat: " + lat + " | Lon: " + lon;

                // API CALL
                fetch("http://localhost:8080/location/update", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        userId: 1,
                        latitude: lat,
                        longitude: lon
                    })
                })
                .then(res => res.text())
                .then(response => {
                    document.getElementById("status").innerText = response;

                    // FIX 5: Don't override POI message if websocket already sent it
                    if (response.includes("No POI")) {
                        document.getElementById("poi").innerText = "No POI nearby ❌";
                    }
                })
                .catch(() => showNotification("API Error", true));
            },

            function(error) {
                showNotification(" Location permission denied", true);
            },

            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            }
        );
    }

    // Notification UI
    function showNotification(message, isError = false) {
        const box = document.getElementById("notification");
        box.style.display = "block";
        box.innerText = message;

        if (isError) {
            box.classList.add("error");
        } else {
            box.classList.remove("error");
        }
    }
</script>

</body>
</html>
